<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Larder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}
body{background:#EDE6DA;font-family:'Karla',sans-serif;color:#33302A;}
::-webkit-scrollbar{width:11px;height:11px;}
::-webkit-scrollbar-thumb{background:#cdc2af;border-radius:8px;border:3px solid transparent;background-clip:content-box;}
button{font-family:'Karla',sans-serif;}
.ph{position:relative;overflow:hidden;background:repeating-linear-gradient(135deg,#E7DFD0 0 10px,#DFD6C5 10px 20px);}
.ph>em{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.08em;color:#AB9F8C;text-transform:uppercase;font-style:normal;pointer-events:none;padding:4px;text-align:center;}
.drag{cursor:grab;}
.drag:active{cursor:grabbing;}
.slot-over{outline:2px dashed #C2745A;outline-offset:-2px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

let DATA = [];

async function loadRecipes() {
  const res = await fetch('/recipes/');
  const raw = await res.json();
  DATA = raw.map(r => ({
    id:    String(r.id),
    title: r.name,
    cat:   r.category,
    time:  r.time_min,
    serv:  r.servings,
    kcal:  r.kcal,
    p:     r.protein_g,
    c:     r.carbs_g,
    f:     r.fat_g,
    fib:   r.fiber_g,
    meat:  r.has_meat,
    img:   r.image_id,
    lbl:   r.name.toLowerCase(),
    tags:  r.tags,
    ing:   r.ingredients.map(i => [i.name, i.quantity, i.unit, i.macro_group]),
    steps: r.steps,
  }));
}

const CAT = {
  primi:        {label:'Primi',        color:'#C2745A'},
  secondi:      {label:'Secondi',      color:'#9C6B3F'},
  contorni:     {label:'Contorni',     color:'#8A9A6F'},
  zuppe:        {label:'Zuppe',        color:'#C99A4E'},
  piatto_unico: {label:'Piatto unico', color:'#7A6EA8'},
  dolci:        {label:'Dolci',        color:'#A8657A'},
  colazione:    {label:'Colazione',    color:'#6E9285'},
};
const GORDER = ['Verdure','Proteine','Pasta/Riso','Latticini','Condimenti','Spezie','Altro'];
const GCOLOR = {
  Verdure:'#8A9A6F', Proteine:'#B05E42', 'Pasta/Riso':'#C99A4E',
  Latticini:'#D9C9A3', Condimenti:'#9C8456', Spezie:'#A8657A', Altro:'#9a9183',
};
const PANTRY = {Spezie:true, Condimenti:true};


// ── STATE ─────────────────────────────────────────────────────────────────────

let state = {
  screen: 'libreria',
  filter: 'Tutte',
  modal: null,
  servings: 4,
  pool: [],
  plan: {},
  activeDays: {lun:true,mar:true,mer:true,gio:true,ven:true,sab:true,dom:true},
  excluded: {},
  removed: {},
  collapsed: {},
  copied: false,
};

let drag = null;
let copyTimeout = null;

function setState(updates) {
  const prevPlan = state.plan;
  if (typeof updates === 'function') updates = updates(state);
  state = {...state, ...updates};
  render();
  if (state.plan !== prevPlan) scheduleSyncPlan();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────

function rec(id) { return DATA.find(r => r.id == id); }
function placedIds() { return Object.values(state.plan).flat(); }
function isAdded(id) { return state.pool.includes(id) || placedIds().includes(id); }

function clonePlan(p) {
  const o = {};
  Object.keys(p).forEach(k => o[k] = [...p[k]]);
  return o;
}

function imgUrl(img, w) {
  if (!img) return '';
  if (img.startsWith('http') || img.startsWith('/')) return img;
  return `https://images.unsplash.com/photo-${img}?w=${w}&q=80&auto=format&fit=crop`;
}

function fmtAmt(qty, unit) {
  if (qty == null) return unit || 'q.b.';
  const tight = ['g','ml','kg','L'];
  let v = qty;
  if (v >= 50) v = Math.round(v/5)*5;
  else if (v >= 10) v = Math.round(v);
  else v = Math.round(v*2)/2;
  return tight.includes(unit) ? (v+unit) : (unit ? v+' '+unit : ''+v);
}

function getDays() {
  const ABBR  = ['dom','lun','mar','mer','gio','ven','sab'];
  const LABEL = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const t = new Date(); t.setHours(12,0,0,0);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(t); d.setDate(t.getDate()+i);
    return {key:ABBR[d.getDay()], label:LABEL[d.getDay()], date:String(d.getDate()), dateObj:d};
  });
}

function getWeekLabel() {
  const M = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  const dd = getDays();
  const a = dd[0].dateObj, b = dd[6].dateObj;
  return a.getMonth()===b.getMonth()
    ? a.getDate()+'–'+b.getDate()+' '+M[a.getMonth()]
    : a.getDate()+' '+M[a.getMonth()]+' – '+b.getDate()+' '+M[b.getMonth()];
}

// ── LOGIC ─────────────────────────────────────────────────────────────────────

function addWeek(id) {
  if (isAdded(id)) return;
  setState(s => ({pool:[...s.pool, id]}));
}

function removeWeek(id) {
  setState(s => {
    const plan = clonePlan(s.plan);
    Object.keys(plan).forEach(k => {
      plan[k] = plan[k].filter(x => x !== id);
      if (plan[k].length === 0) delete plan[k];
    });
    return {pool:s.pool.filter(x => x !== id), plan};
  });
}

function toggleWeek(id) { isAdded(id) ? removeWeek(id) : addWeek(id); }

function clearCalendar() {
  setState(s => {
    const all = Object.values(s.plan).flat();
    return {plan:{}, pool:[...new Set([...s.pool, ...all])]};
  });
}

function clearPool() { setState({pool:[]}); }

async function autoDistribute() {
  const slots = [];
  getDays().forEach(({key}) => {
    if (state.activeDays[key]) { slots.push(key+'-pranzo'); slots.push(key+'-cena'); }
  });
  if (slots.length === 0) return;

  const excluded_ids = Object.keys(state.excluded)
    .filter(id => state.excluded[id])
    .map(Number);

  let res;
  try {
    const resp = await fetch('/meal-plan/auto-plan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({slots, excluded_ids}),
    });
    if (!resp.ok) { const t = await resp.text(); throw new Error(t); }
    res = await resp.json();
  } catch (err) {
    alert('Auto-distribuzione fallita: ' + err.message);
    return;
  }

  setState(s => {
    const plan = {};
    Object.entries(res.plan).forEach(([slot, ids]) => { plan[slot] = ids.map(String); });
    const assigned = new Set(Object.values(plan).flat());
    const pool = s.pool.filter(id => !assigned.has(String(id)));
    return {plan, pool};
  });
}

function shopGroups() {
  const ids = placedIds();
  const map = {};
  ids.forEach(id => {
    const r = rec(id); if (!r) return;
    r.ing.forEach(([name, qty, unit, macro]) => {
      map[macro] = map[macro] || {};
      const cur = map[macro][name] || {qty:0, unit:unit, num:false, nn:false};
      if (qty != null && (unit === cur.unit || !cur.num)) { cur.qty += qty; cur.unit = unit; cur.num = true; }
      else if (qty == null) { cur.nn = true; cur.unit = cur.unit || unit; }
      map[macro][name] = cur;
    });
  });
  return GORDER.filter(m => map[m]).map(macro => {
    const items = Object.keys(map[macro]).map(name => {
      const o = map[macro][name];
      return {name, amount: o.num ? fmtAmt(o.qty, o.unit) : fmtAmt(null, o.unit), macro};
    });
    return {macro, items};
  });
}

// ── PLAN PERSISTENCE ──────────────────────────────────────────────────────────

function isoDate(d) { return d.toISOString().slice(0, 10); }

let syncTimer = null;
function scheduleSyncPlan() {
  clearTimeout(syncTimer);
  try { localStorage.setItem('larder_plan', JSON.stringify(state.plan)); } catch(_) {}
  syncTimer = setTimeout(() => syncPlan().catch(() => { syncTimer = setTimeout(scheduleSyncPlan, 5000); }), 400);
}

async function syncPlan() {
  const days = getDays();
  const dayMap = {};
  days.forEach(d => { dayMap[d.key] = isoDate(d.dateObj); });

  const allEntries = (await Promise.all(
    days.map(({dateObj}) =>
      fetch(`/meal-plan/${isoDate(dateObj)}`).then(r => r.ok ? r.json() : [])
    )
  )).flat();

  await Promise.all(allEntries.map(e => fetch(`/meal-plan/${e.id}`, {method:'DELETE'})));

  await Promise.all(
    Object.entries(state.plan).flatMap(([slotKey, ids]) => {
      const [dayKey, mealType] = slotKey.split('-');
      const date = dayMap[dayKey];
      if (!date) return [];
      return ids.map(id => fetch('/meal-plan/', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({date, meal_type: mealType, recipe_id: parseInt(id)}),
      }));
    })
  );
}

async function loadPlanFromApi() {
  const days = getDays();
  const dateToKey = {};
  days.forEach(d => { dateToKey[isoDate(d.dateObj)] = d.key; });

  const allEntries = (await Promise.all(
    days.map(({dateObj}) =>
      fetch(`/meal-plan/${isoDate(dateObj)}`).then(r => r.ok ? r.json() : [])
    )
  )).flat();

  const plan = {};
  for (const e of allEntries) {
    if (!e.recipe_id) continue;
    const dayKey = dateToKey[e.date];
    if (!dayKey) continue;
    const slotKey = `${dayKey}-${e.meal_type}`;
    (plan[slotKey] = plan[slotKey] || []).push(String(e.recipe_id));
  }
  return plan;
}

function copyList() {
  const groups = shopGroups();
  const lines = ['Lista della spesa settimana '+getWeekLabel()+':'];
  groups.forEach(g => g.items.forEach(it => {
    const key = g.macro+'|'+it.name;
    if (!state.removed[key]) lines.push(`- ${it.amount} ${it.name.toLowerCase()}`);
  }));
  try { navigator.clipboard.writeText(lines.join('\n')); } catch(e) {}
  setState({copied:true});
  clearTimeout(copyTimeout);
  copyTimeout = setTimeout(() => setState({copied:false}), 2200);
}

// ── BUILD: NAV ────────────────────────────────────────────────────────────────

function buildNav() {
  const tabs = [['libreria','Libreria'],['calendario','Calendario'],['spesa','Lista della Spesa']];
  const weekTotal = state.pool.length + placedIds().length;
  const tabsHtml = tabs.map(([k, label]) => {
    const active = state.screen === k;
    return `<div data-action="nav" data-screen="${k}" style="position:relative;padding:7px 16px;font-size:14px;font-weight:600;cursor:pointer;color:${active?'#33302A':'#9a9183'};">
      ${label}
      ${active ? '<div style="position:absolute;left:16px;right:16px;bottom:-1px;height:2px;background:#C2745A;border-radius:2px;"></div>' : ''}
    </div>`;
  }).join('');
  return `
    <div style="position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 36px;height:64px;background:rgba(243,238,230,.92);backdrop-filter:blur(8px);border-bottom:1px solid #E1D8C9;">
      <div style="font-family:'Spectral',serif;font-weight:700;font-size:40px;letter-spacing:.01em;">Larder</div>
      <div style="display:flex;gap:6px;">${tabsHtml}</div>
      <div data-action="go-cal" style="display:flex;align-items:center;gap:9px;background:#33302A;color:#F3EEE6;padding:8px 15px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;">
        <span style="font-size:15px;">🗒️</span><span>La settimana</span>
        <span style="background:#C2745A;color:#fff;min-width:21px;height:21px;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;padding:0 6px;">${weekTotal}</span>
      </div>
    </div>`;
}

// ── BUILD: LIBRARY ────────────────────────────────────────────────────────────

function buildLibrary() {
  const cats = ['Tutte','Primi','Secondi','Contorni','Zuppe','Piatto unico','Dolci','Colazione'];
  const filtersHtml = cats.map(label => {
    const active = state.filter === label;
    return `<div data-action="filter" data-filter="${label}" style="font-size:13px;font-weight:600;padding:8px 16px;border-radius:30px;cursor:pointer;background:${active?'#C2745A':'transparent'};color:${active?'#fff':'#6f675a'};border:1px solid ${active?'#C2745A':'#DDD4C6'};">${label}</div>`;
  }).join('');

  const fkey = state.filter === 'Tutte' ? null : Object.keys(CAT).find(k => CAT[k].label === state.filter);
  const recipesHtml = DATA.filter(r => !fkey || r.cat === fkey).map(r => {
    const added = isAdded(r.id);
    const excl = !!state.excluded[r.id];
    return `<div style="background:#FBF8F2;border-radius:13px;overflow:hidden;box-shadow:0 1px 3px rgba(70,50,30,.07);border:1px solid ${excl?'#E0D7C7':'#EDE5D6'};display:flex;flex-direction:column;opacity:${excl?'0.5':'1'};">
      <div class="ph" data-action="open-recipe" data-id="${r.id}" style="aspect-ratio:4/3;cursor:pointer;">
        <em>foto · ${r.lbl}</em>
        <div style="position:absolute;inset:0;background-image:url(${imgUrl(r.img,520)});background-size:cover;background-position:center;"></div>
      </div>
      <div style="padding:11px 13px 13px;display:flex;flex-direction:column;flex:1;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
          <span style="width:7px;height:7px;border-radius:50%;background:${CAT[r.cat].color};flex:none;"></span>
          <span style="font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a89e8d;">${CAT[r.cat].label} · ${r.time}′</span>
        </div>
        <div data-action="open-recipe" data-id="${r.id}" style="font-family:'Spectral',serif;font-weight:600;font-size:20px;line-height:1.08;color:#33302A;cursor:pointer;margin-bottom:7px;min-height:43px;">${r.title}</div>
        <div style="font-size:11.5px;color:#a89e8d;margin-bottom:11px;">${[r.kcal!=null?r.kcal+' kcal':null, r.p!=null?r.p+'g proteine':null].filter(Boolean).join(' · ') || '—'}</div>
        <button data-action="toggle-week" data-id="${r.id}" style="margin-top:auto;width:100%;border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:9px 10px;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:6px;background:${added?'#EBF0E1':'#33302A'};color:${added?'#6E8350':'#F3EEE6'};border:1px solid ${added?'#D5E0C2':'#33302A'};">${added?'✓ Nella settimana':'+ Aggiungi alla settimana'}</button>
        <button data-action="toggle-exclude" data-id="${r.id}" style="margin-top:5px;width:100%;border:none;cursor:pointer;font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;background:${excl?'#F5EAE2':'transparent'};color:${excl?'#B05E42':'#c2b9a7'};">${excl?'↩ Ripristina':'✕ Escludi dall\'auto-piano'}</button>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="max-width:1280px;margin:0 auto;padding:34px 36px 80px;">
      <div style="text-align:center;margin:8px 0 26px;">
        <div style="font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:#C2745A;margin-bottom:10px;">Il tuo ricettario</div>
        <h1 style="font-family:'Spectral',serif;font-weight:600;font-size:46px;line-height:1;">La tua libreria</h1>
        <div style="font-size:13.5px;color:#9a9183;margin-top:9px;">${DATA.length} ricette · clicca una foto per aprire · aggiungi i piatti alla settimana</div>
      </div>
      <div style="display:flex;justify-content:center;gap:8px;margin-bottom:30px;flex-wrap:wrap;">${filtersHtml}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:20px;">${recipesHtml}</div>
    </div>`;
}

// ── BUILD: CALENDAR ───────────────────────────────────────────────────────────

function buildCalendar() {
  const dynDays = getDays();
  const weekLabel = getWeekLabel();

  const poolHtml = state.pool.length === 0
    ? `<span style="font-size:13px;color:#b3a994;font-style:italic;">Tutti i piatti sono assegnati — aggiungine altri dalla Libreria.</span>`
    : state.pool.map(id => {
        const r = rec(id);
        return `<div class="drag" draggable="true" data-drag-id="${id}" data-drag-from="pool" style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E6DDCD;border-radius:10px;padding:7px 11px 7px 9px;box-shadow:0 1px 2px rgba(70,50,30,.06);">
          <span style="width:7px;height:7px;border-radius:50%;background:${CAT[r.cat].color};"></span>
          <span style="font-family:'Spectral',serif;font-weight:600;font-size:16px;line-height:1;">${r.title}</span>
          <span data-action="remove-pool" data-id="${id}" style="cursor:pointer;color:#bcb3a2;font-size:15px;line-height:1;padding-left:2px;">×</span>
        </div>`;
      }).join('');

  const gridHeaders = dynDays.map(({label}) =>
    `<div style="text-align:center;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#a89e8d;padding-bottom:2px;">${label}</div>`
  ).join('');

  function buildSlot(slotKey) {
    const ids = state.plan[slotKey] || [];
    const dishesHtml = ids.map(id => {
      const r = rec(id);
      return `<div class="drag" draggable="true" data-drag-id="${id}" data-drag-from="${slotKey}" style="position:relative;display:flex;align-items:center;gap:7px;background:#fff;border-radius:8px;padding:4px 22px 4px 4px;box-shadow:0 1px 2px rgba(70,50,30,.1);">
        <div class="ph" style="width:30px;height:30px;border-radius:6px;flex:none;">
          <div style="position:absolute;inset:0;background-image:url(${imgUrl(r.img,120)});background-size:cover;background-position:center;"></div>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="width:5px;height:5px;border-radius:50%;background:${CAT[r.cat].color};"></span>
            <span style="font-size:8.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#a89e8d;">${CAT[r.cat].label}</span>
          </div>
          <div style="font-family:'Spectral',serif;font-weight:600;font-size:13.5px;line-height:1.05;color:#33302A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.title}</div>
        </div>
        <span data-action="remove-dish" data-slot="${slotKey}" data-id="${id}" style="position:absolute;top:50%;right:5px;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:#EFE7D8;color:#a89e8d;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;line-height:1;">×</span>
      </div>`;
    }).join('');
    const has = ids.length > 0;
    return `<div data-drop-slot="${slotKey}" style="min-height:94px;border-radius:11px;padding:7px;background:${has?'#F1EADC':'#F4EFE6'};border:1.5px ${has?'solid':'dashed'} ${has?'#E4DBCB':'#E0D7C7'};display:flex;flex-direction:column;gap:6px;">
      ${dishesHtml}
      ${!has ? `<div style="flex:1;min-height:60px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#c2b9a7;text-align:center;line-height:1.3;padding:4px;">trascina qui</div>` : ''}
      ${has ? `<div style="text-align:center;font-size:9.5px;font-weight:600;letter-spacing:.05em;color:#cbbfa9;text-transform:uppercase;padding:1px;">＋ trascina ancora</div>` : ''}
    </div>`;
  }

  const pranzoSlots = dynDays.map(({key}) => buildSlot(key+'-pranzo')).join('');
  const cenaSlots   = dynDays.map(({key}) => buildSlot(key+'-cena')).join('');

  return `
    <div style="max-width:1320px;margin:0 auto;padding:30px 36px 80px;">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:22px;">
        <div>
          <div style="font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#C2745A;margin-bottom:8px;">Piano settimanale · ${weekLabel}</div>
          <h1 style="font-family:'Spectral',serif;font-weight:600;font-size:40px;line-height:1;">Cosa cuciniamo</h1>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button data-action="clear-calendar" style="font-size:13.5px;font-weight:600;cursor:pointer;padding:11px 18px;border-radius:30px;border:1.5px solid #E0D7C7;background:transparent;color:#a89e8d;display:flex;align-items:center;gap:7px;">✕ Svuota calendario</button>
          <button data-action="clear-pool" style="font-size:13.5px;font-weight:600;cursor:pointer;padding:11px 18px;border-radius:30px;border:1.5px solid #E0D7C7;background:transparent;color:#a89e8d;display:flex;align-items:center;gap:7px;">✕ Svuota da cucinare</button>
          <button data-action="auto-distribute" style="font-size:13.5px;font-weight:700;cursor:pointer;padding:11px 18px;border-radius:30px;border:1.5px solid #C2745A;background:#FBF8F2;color:#B05E42;display:flex;align-items:center;gap:7px;">✨ Auto-distribuisci</button>
          <button data-action="go-spesa" style="font-size:13.5px;font-weight:700;cursor:pointer;padding:11px 18px;border-radius:30px;border:none;background:#33302A;color:#F3EEE6;display:flex;align-items:center;gap:7px;">🛒 Genera Lista della Spesa</button>
        </div>
      </div>

      <div style="background:#FBF8F2;border:1px dashed #D8CDB9;border-radius:14px;padding:15px 18px;margin-bottom:20px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#a89e8d;margin-bottom:11px;">Da cucinare — trascina nei pasti 👇</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;min-height:40px;">${poolHtml}</div>
      </div>

      <div style="display:grid;grid-template-columns:64px repeat(7,1fr);gap:9px;align-items:stretch;">
        <div></div>${gridHeaders}
        <div style="display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:'Spectral',serif;font-weight:600;font-size:17px;color:#C2745A;">Pranzo</div>
        ${pranzoSlots}
        <div style="display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:'Spectral',serif;font-weight:600;font-size:17px;color:#8A9A6F;">Cena</div>
        ${cenaSlots}
      </div>
    </div>`;
}

// ── BUILD: SHOPPING ───────────────────────────────────────────────────────────

function buildShopping() {
  const groups = shopGroups();
  const weekLabel = getWeekLabel();
  const totalItems = groups.reduce((a,g) => a+g.items.length, 0);
  const activeCount = groups.reduce((a,g) => a+g.items.filter(it => !state.removed[g.macro+'|'+it.name]).length, 0);
  const placedCount = placedIds().length;

  const groupsHtml = groups.map(g => {
    const open = !state.collapsed[g.macro];
    const color = GCOLOR[g.macro];
    const itemsHtml = g.items.map(it => {
      const key = g.macro+'|'+it.name;
      const on = !state.removed[key];
      return `<div data-action="toggle-item" data-key="${key}" style="display:flex;align-items:center;gap:12px;padding:9px 4px;border-top:1px solid #EFE7D8;cursor:pointer;">
        <span style="width:19px;height:19px;border-radius:5px;border:1.5px solid ${on?color:'#cdc4b2'};background:${on?color:'transparent'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;">${on?'✓':''}</span>
        <span style="font-size:14.5px;font-weight:600;color:${on?'#B05E42':'#c2b9a7'};min-width:74px;${on?'':'text-decoration:line-through;'}">${it.amount}</span>
        <span style="font-size:14.5px;color:${on?'#4d473c':'#c2b9a7'};${on?'':'text-decoration:line-through;'}">${it.name}</span>
      </div>`;
    }).join('');

    return `<div style="background:#FBF8F2;border:1px solid #EAE1D1;border-radius:14px;margin-bottom:14px;overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 18px;">
        <div data-action="toggle-group" data-macro="${g.macro}" style="display:flex;align-items:center;gap:11px;cursor:pointer;flex:1;">
          <span style="font-size:13px;color:#b3a994;transform:rotate(${open?'90deg':'0deg'});transition:transform .15s;display:inline-block;">▸</span>
          <span style="width:10px;height:10px;border-radius:3px;background:${color};"></span>
          <span style="font-family:'Spectral',serif;font-weight:600;font-size:22px;color:#33302A;">${g.macro}</span>
          <span style="font-size:12px;color:#a89e8d;">${g.items.length} ${g.items.length===1?'voce':'voci'}</span>
          ${PANTRY[g.macro] ? `<span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#B89A5B;background:#F2E9D2;padding:3px 8px;border-radius:20px;">dispensa</span>` : ''}
        </div>
        <span data-action="remove-group" data-macro="${g.macro}" style="font-size:12px;font-weight:600;color:#B05E42;cursor:pointer;white-space:nowrap;">Rimuovi tutte</span>
      </div>
      ${open ? `<div style="padding:0 18px 8px;">${itemsHtml}</div>` : ''}
    </div>`;
  }).join('');

  const emptyHtml = totalItems === 0 ? `
    <div style="background:#FBF8F2;border:1px dashed #D8CDB9;border-radius:14px;padding:48px;text-align:center;color:#a89e8d;">
      <div style="font-size:34px;margin-bottom:10px;">🧺</div>
      <div style="font-family:'Spectral',serif;font-size:22px;color:#6f675a;margin-bottom:6px;">Nessun piatto in programma</div>
      <div style="font-size:13.5px;">Aggiungi dei piatti al calendario per generare la lista.</div>
    </div>` : '';

  return `
    <div style="max-width:880px;margin:0 auto;padding:30px 36px 90px;">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:8px;">
        <div>
          <div style="font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:#C2745A;margin-bottom:8px;">Settimana ${weekLabel}</div>
          <h1 style="font-family:'Spectral',serif;font-weight:600;font-size:42px;line-height:1;">Lista della Spesa</h1>
        </div>
        <button data-action="copy-list" style="font-size:14px;font-weight:700;cursor:pointer;padding:12px 22px;border-radius:30px;border:none;background:${state.copied?'#6E8350':'#33302A'};color:#F3EEE6;display:flex;align-items:center;gap:8px;">${state.copied?'✓ Copiata!':'📋 Copia Lista'}</button>
      </div>
      <div style="font-size:13px;color:#9a9183;margin-bottom:26px;">${activeCount} ingredienti da comprare · ${placedCount} piatti in programma</div>
      ${emptyHtml}
      ${groupsHtml}
    </div>`;
}

// ── BUILD: MODAL ──────────────────────────────────────────────────────────────

function buildModal() {
  if (!state.modal) return '';
  const r = rec(state.modal);
  if (!r) return '';
  const added = isAdded(r.id);
  const factor = state.servings / r.serv;

  const tagsHtml = r.tags.map(t =>
    `<span style="font-size:12px;font-weight:600;color:#7a9160;background:#E9EEDD;padding:5px 12px;border-radius:20px;">${t}</span>`
  ).join('');

  const ingsHtml = r.ing.map(([name, qty, unit]) =>
    `<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #E9E0D0;">
      <span style="font-weight:700;font-size:14px;color:#B05E42;min-width:72px;">${fmtAmt(qty==null?null:qty*factor, unit)}</span>
      <span style="font-size:14px;color:#4d473c;">${name}</span>
    </div>`
  ).join('');

  const fmtNutr = (v, u) => v != null ? v + ' ' + u : '-';
  const nutrition = [
    ['Calorie', fmtNutr(r.kcal, 'kcal')],
    ['Proteine', fmtNutr(r.p, 'g')],
    ['Carboidrati', fmtNutr(r.c, 'g')],
    ['Grassi', fmtNutr(r.f, 'g')],
    ['Fibre', fmtNutr(r.fib, 'g')],
  ];
  const nutHtml = nutrition.map(([label, value], i) =>
    `<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid ${i===nutrition.length-1?'transparent':'#EFE7D8'};">
      <span style="font-size:13.5px;color:#6f675a;">${label}</span>
      <span style="font-family:'Spectral',serif;font-weight:700;font-size:20px;color:#33302A;">${value}</span>
    </div>`
  ).join('');

  const stepsHtml = r.steps.map((text, i) =>
    `<div style="display:flex;gap:15px;margin-bottom:16px;">
      <span style="flex:none;width:30px;height:30px;border-radius:50%;background:#C2745A;color:#fff;font-family:'Spectral',serif;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;">${i+1}</span>
      <span style="font-size:14.5px;line-height:1.6;color:#4d473c;padding-top:4px;">${text}</span>
    </div>`
  ).join('');

  return `
    <div id="modal-overlay" style="position:fixed;inset:0;z-index:60;background:rgba(40,34,26,.55);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:46px 20px;overflow-y:auto;">
      <div id="modal-card" style="background:#F6F1E8;width:100%;max-width:760px;border-radius:18px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);">
        <div class="ph" style="height:300px;position:relative;">
          <em>foto · ${r.lbl}</em>
          <div style="position:absolute;inset:0;background-image:url(${imgUrl(r.img,900)});background-size:cover;background-position:center;"></div>
          <span data-action="close-modal" style="position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;line-height:1;z-index:2;">×</span>
          <div style="position:absolute;left:0;right:0;bottom:0;height:120px;background:linear-gradient(transparent,rgba(30,24,18,.78));"></div>
          <div style="position:absolute;left:26px;bottom:18px;right:26px;">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">
              <span style="width:8px;height:8px;border-radius:50%;background:${CAT[r.cat].color};"></span>
              <span style="font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#f0e7d8;">${CAT[r.cat].label} · ${r.time} min</span>
            </div>
            <h2 style="font-family:'Spectral',serif;font-weight:600;font-size:38px;line-height:1.02;margin:0;color:#fff;">${r.title}</h2>
          </div>
        </div>

        <div style="padding:24px 28px 8px;display:flex;gap:10px;flex-wrap:wrap;">${tagsHtml}</div>

        <div style="display:grid;grid-template-columns:1.1fr .9fr;gap:26px;padding:18px 28px 26px;">
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
              <h3 style="font-family:'Spectral',serif;font-weight:600;font-size:24px;margin:0;">Ingredienti</h3>
              <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #E6DDCD;border-radius:30px;padding:4px 6px;">
                <span data-action="dec-servings" style="width:26px;height:26px;border-radius:50%;background:#F0E9DC;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:#8a7f6c;line-height:1;">−</span>
                <span style="font-size:13px;font-weight:700;min-width:62px;text-align:center;">${state.servings} porzioni</span>
                <span data-action="inc-servings" style="width:26px;height:26px;border-radius:50%;background:#F0E9DC;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:#8a7f6c;line-height:1;">+</span>
              </div>
            </div>
            ${ingsHtml}
          </div>
          <div>
            <h3 style="font-family:'Spectral',serif;font-weight:600;font-size:24px;margin:0 0 14px;">Valori · porzione</h3>
            <div style="background:#fff;border:1px solid #EAE1D1;border-radius:14px;padding:6px 16px;">${nutHtml}</div>
          </div>
        </div>

        <div style="padding:0 28px 26px;">
          <h3 style="font-family:'Spectral',serif;font-weight:600;font-size:24px;margin:0 0 14px;">Preparazione</h3>
          ${stepsHtml}
        </div>

        <div style="position:sticky;bottom:0;background:#F6F1E8;border-top:1px solid #E6DDCD;padding:15px 28px;display:flex;gap:12px;">
          <button data-action="toggle-week" data-id="${r.id}" style="flex:1;font-size:14.5px;font-weight:700;cursor:pointer;padding:13px;border-radius:11px;border:none;background:${added?'#EBF0E1':'#C2745A'};color:${added?'#6E8350':'#fff'};">${added?'✓ Nella settimana — rimuovi':'+ Aggiungi alla settimana'}</button>
          <button data-action="close-modal" style="font-size:14.5px;font-weight:600;cursor:pointer;padding:13px 22px;border-radius:11px;border:1px solid #D8CDB9;background:transparent;color:#6f675a;">Chiudi</button>
        </div>
      </div>
    </div>`;
}

// ── RENDER & EVENTS ───────────────────────────────────────────────────────────

function render() {
  document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;">
      ${buildNav()}
      ${state.screen==='libreria'  ? buildLibrary()  : ''}
      ${state.screen==='calendario'? buildCalendar() : ''}
      ${state.screen==='spesa'     ? buildShopping() : ''}
      ${state.modal                ? buildModal()    : ''}
    </div>`;
}

function attachEvents() {
  const app = document.getElementById('app');

  // ── click delegation ──────────────────────────────────────────────────────
  app.addEventListener('click', e => {
    if (e.target.id === 'modal-overlay') { setState({modal:null}); return; }
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const {action, screen, filter, id, key, macro, slot} = el.dataset;

    switch (action) {
      case 'nav':             setState({screen}); break;
      case 'go-cal':         setState({screen:'calendario'}); break;
      case 'filter':         setState({filter}); break;
      case 'open-recipe':    setState({modal:id, servings:rec(id)?.serv||4}); break;

      case 'toggle-week':
        e.stopPropagation();
        toggleWeek(id);
        break;

      case 'toggle-exclude':
        e.stopPropagation();
        setState(s => ({excluded: {...s.excluded, [id]: !s.excluded[id]}}));
        break;

      case 'remove-pool':    removeWeek(id); break;

      case 'remove-dish':
        setState(s => {
          const plan = clonePlan(s.plan);
          if (plan[slot]) { plan[slot] = plan[slot].filter(x=>x!==id); if(!plan[slot].length) delete plan[slot]; }
          return {plan, pool:[...s.pool, id]};
        });
        break;

      case 'clear-calendar':  clearCalendar(); break;
      case 'clear-pool':      clearPool(); break;
      case 'auto-distribute': autoDistribute().catch(err => console.error('auto-distribute:', err)); break;
      case 'go-spesa':        setState({screen:'spesa'}); break;

      case 'toggle-item':
        setState(s => ({removed:{...s.removed, [key]:!s.removed[key]}}));
        break;

      case 'toggle-group':
        setState(s => ({collapsed:{...s.collapsed, [macro]:!s.collapsed[macro]}}));
        break;

      case 'remove-group':
        e.stopPropagation();
        setState(s => {
          const rm = {...s.removed};
          shopGroups().find(g=>g.macro===macro)?.items.forEach(it => rm[macro+'|'+it.name] = true);
          return {removed:rm};
        });
        break;

      case 'copy-list':    copyList(); break;
      case 'close-modal':  setState({modal:null}); break;
      case 'dec-servings': setState(s => ({servings:Math.max(1, s.servings-1)})); break;
      case 'inc-servings': setState(s => ({servings:Math.min(12, s.servings+1)})); break;
    }
  });

  // ── drag & drop ───────────────────────────────────────────────────────────
  app.addEventListener('dragstart', e => {
    const el = e.target.closest('[data-drag-id]');
    if (!el) return;
    drag = {id:el.dataset.dragId, from:el.dataset.dragFrom};
    if (e.dataTransfer) { e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain', drag.id); }
    setTimeout(() => el.style.opacity='0.45', 0);
  });

  app.addEventListener('dragend', e => {
    const el = e.target.closest('[data-drag-id]');
    if (el) el.style.opacity='';
  });

  app.addEventListener('dragover', e => {
    const slot = e.target.closest('[data-drop-slot]');
    if (slot) { e.preventDefault(); slot.classList.add('slot-over'); }
  });

  app.addEventListener('dragleave', e => {
    const slot = e.target.closest('[data-drop-slot]');
    if (slot && !slot.contains(e.relatedTarget)) slot.classList.remove('slot-over');
  });

  app.addEventListener('drop', e => {
    const slot = e.target.closest('[data-drop-slot]');
    if (!slot) return;
    e.preventDefault();
    slot.classList.remove('slot-over');
    if (!drag || slot.dataset.dropActive !== 'true') return;
    const {id, from} = drag; drag = null;
    setState(s => {
      const plan = clonePlan(s.plan); let pool = [...s.pool];
      const slotKey = slot.dataset.dropSlot;
      if (from === 'pool') { pool = pool.filter(x=>x!==id); }
      else if (plan[from]) { plan[from]=plan[from].filter(x=>x!==id); if(!plan[from].length) delete plan[from]; }
      const arr = plan[slotKey]||[]; if (!arr.includes(id)) arr.push(id); plan[slotKey]=arr;
      return {plan, pool};
    });
  });
}

loadRecipes().then(async () => {
  let plan = {};
  try { plan = await loadPlanFromApi(); } catch(_) {}
  if (Object.keys(plan).length === 0) {
    try {
      const saved = localStorage.getItem('larder_plan');
      if (saved) {
        plan = JSON.parse(saved);
        // DB era vuoto ma localStorage ha dati: ri-sincronizza
        state = {...state, plan};
        scheduleSyncPlan();
      }
    } catch(_) {}
  }
  state = {...state, plan};
  render();
  attachEvents();
  window.addEventListener('online', scheduleSyncPlan);
});
</script>
