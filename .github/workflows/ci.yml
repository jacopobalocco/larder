name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: pip install ruff
        # TODO: also install project deps once defined (e.g. 'pip install -e .[dev]')

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: echo "TODO: run tests (e.g. 'pytest -q')"
